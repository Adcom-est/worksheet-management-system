function Badge({ type, children }) {
  const map = { g: s.badgeG, a: s.badgeA, r: s.badgeR, b: s.badgeB, aw: s.badgeAW };
  return <span style={map[type] || s.badgeB}>{children}</span>;
}

function StatCard({ label, value, color }) {
  return (
    <div style={s.statCard}>
      <div style={s.statLabel}>{label}</div>
      <div style={{ ...s.statVal, color: color || "#1a1a1a" }}>{value}</div>
    </div>
  );
}

function Tbl({ heads, rows }) {
  return (
    <div style={{ overflowX: "auto" }}>
      <table style={s.tbl}>
        <thead><tr>{heads.map((h, i) => <th key={i} style={{ ...s.th, textAlign: h.center ? "center" : "left" }}>{h.label || h}</th>)}</tr></thead>
        <tbody>{rows}</tbody>
      </table>
    </div>
  );
}

function Modal({ title, onClose, children, footer }) {
  return (
    <div style={s.modalBg} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={s.modal}>
        <div style={s.modalHead}>
          <div style={s.modalTitle}>{title}</div>
          <button style={s.btnS} onClick={onClose}>✕</button>
        </div>
        <div style={s.modalBody}>{children}</div>
        {footer && <div style={s.modalFoot}>{footer}</div>}
      </div>
    </div>
  );
}

function FormField({ label, children }) {

    <div style={s.fg}>
      <label style={s.label}>{label}</label>
      {children}
    </div>
  );
}

          model: "claude-sonnet-4-20250514", max_tokens: 1500,
          system: `You fetch Gmail inbox for dycomest11@gmail.com using the Gmail MCP tool.
Return ONLY a valid JSON array. No markdown, no explanation, no code fences.

Fetch the latest 15 inbox emails. If MCP unavailable, return realistic Indian government office sample data (minimum 8 emails).`,

      for (const b of (data.content || [])) {

        if (b.type === "mcp_tool_result") raw += b.content?.[0]?.text || "";

    } catch {

        { id: "g001", from: "collectorate.csn@gov.in", subject: "तातडी: NH52 रस्ता रुंदीकरण NOC आवश्यक", snippet: "PWD अर्जावर तातडीने कार्यवाही करावी. अंतिम मुदत ३१ जाने.", date: "27 Jan 2025", unread: true },
        { id: "g002", from: "tahsildar.paithan@gov.in", subject: "जमीन संपादन — सर्व्हे नं. २३४/१ गंगापूर", snippet: "जमीन नोंदी पडताळणीसाठी पाठवत आहे, कृपया आवश्यक कार्यवाही करावी.", date: "26 Jan 2025", unread: true },
        { id: "g003", from: "treasury.csn@gov.in", subject: "GPF काढणे अर्ज — श्री एम.के. शिंदे", snippet: "GPF काढण्याचा अर्ज प्रक्रिया करून AG कार्यालयास पाठवावा.", date: "26 Jan 2025", unread: false },
        { id: "g004", from: "grievance.mh@gov.in", subject: "जनतक्रार #MH2025-4521 — पाणीपुरवठा CIDCO", snippet: "कार्यालयाकडे एस्केलेट केलेली जनतक्रार. कृपया कार्यवाही करावी.", date: "25 Jan 2025", unread: true },
        { id: "g005", from: "rto.csn@gov.in", subject: "व्यावसायिक वाहन परवाना NOC — घनश्याम ट्रेडर्स", snippet: "अतिरिक्त व्यावसायिक वाहन परवान्यासाठी NOC अर्ज सादर.", date: "25 Jan 2025", unread: false },
        { id: "g006", from: "zp.csn@gov.in", subject: "अनुदान उपयोगिता अहवाल प्रलंबित — तिमाही ३", snippet: "योजना निधीसाठी Q3 उपयोगिता प्रमाणपत्र त्वरित सादर करावे.", date: "24 Jan 2025", unread: true },
        { id: "g007", from: "police.cidco@gov.in", subject: "अतिक्रमण तक्रार — शासकीय जमीन औरंगाबाद नाका", snippet: "सर्व्हे नं. ४५ वरील अतिक्रमणाबाबत तक्रार प्राप्त. कार्यवाही करावी.", date: "24 Jan 2025", unread: false },
        { id: "g008", from: "pwd.csn@gov.in", subject: "पूल दुरुस्ती परवानगी — गोदावरी पूल", snippet: "PWD ने पूल दुरुस्तीसाठी परवानगी मागितली आहे. NOC द्यावी.", date: "23 Jan 2025", unread: true },
      ]);
    }
    setGmailLoading(false);
  };

  const addClerk = (data) => {
    if (users.find(u => u.username === data.username)) { alert("हे username आधीच वापरले आहे"); return; }
    setUsers(us => [...us, { id: "u" + Date.now(), role: "clerk", active: true, ...data }]);
    closeModal();
  };

  const editClerk = (id, data) => {
    setUsers(us => us.map(u => u.id === id ? { ...u, ...data } : u));
    closeModal();
  };

  const removeClerk = (id) => {
    if (window.confirm("हा लिपिक काढायचा आहे का?")) setUsers(us => us.filter(u => u.id !== id));
  };

  const addDept = (data) => {
    if (depts.find(d => d.code === data.code)) { alert("हा विभाग कोड आधीच वापरला आहे"); return; }
    setDepts(ds => [...ds, { id: "d" + Date.now(), active: true, clerkIds: [], ...data }]);
    closeModal();
  };

  const editDept = (id, data) => {
    setDepts(ds => ds.map(d => d.id === id ? { ...d, ...data } : d));
    closeModal();
  };

  const removeDept = (id) => {
    if (window.confirm("हा विभाग काढायचा आहे का?")) setDepts(ds => ds.filter(d => d.id !== id));
  };

  const toggleDeptClerk = (deptId, clerkId) => {
    setDepts(ds => ds.map(d => {
      if (d.id !== deptId) return d;
      const has = d.clerkIds.includes(clerkId);
      return { ...d, clerkIds: has ? d.clerkIds.filter(c => c !== clerkId) : [...d.clerkIds, clerkId] };
    }));
  };

  // Workflow helpers
  const getWf = (clerkId) => workflows[clerkId] || { status: "draft", soInstruction: "", bdoInstruction: "", forwardedAt: null, soReviewedAt: null, bdoDecidedAt: null, soDecision: null, bdoDecision: null };
  const setWf = (clerkId, patch) => setWorkflows(w => ({ ...w, [clerkId]: { ...getWf(clerkId), ...patch } }));

  // Clerk forwards worksheet to SO
  const forwardToSO = (clerkId) => {
    const cl = letters.filter(l => l.clerkId === clerkId);
    if (!cl.length) { alert("कार्य विवरणात कोणत्याही नोंदी नाहीत. प्रथम नोंदी जोडा."); return; }
    setWf(clerkId, { status: "forwarded_so", forwardedAt: new Date().toLocaleString("mr-IN") });
  };

  // SO gives instructions or approves, then forwards to BDO
  const soReview = (clerkId, decision, instruction) => {
    setWf(clerkId, { soDecision: decision, soInstruction: instruction, soReviewedAt: new Date().toLocaleString("mr-IN"), status: decision === "forward" ? "forwarded_bdo" : "so_returned" });
  };

  // BDO final decision
  const bdoDecide = (clerkId, decision, instruction) => {
    setWf(clerkId, { bdoDecision: decision, bdoInstruction: instruction, bdoDecidedAt: new Date().toLocaleString("mr-IN"), status: decision === "approved" ? "bdo_approved" : "bdo_returned" });
  };

  const doApprove = (decision, remark) => {
    setApprovals(a => {
      const n = { ...a };
      if (user.role === "so") { n.so = decision; n.soR = remark; }
      else if (user.role === "bdo") { n.bdo = decision; n.bdoR = remark; }
      else if (user.role === "ac") { n.ac = decision; n.acR = remark; }
      return n;
    });
  };

  if (!user) return <LoginPage loginU={loginU} setLoginU={setLoginU} loginP={loginP} setLoginP={setLoginP} loginErr={loginErr} doLogin={doLogin} />;

  // Pending items for SO and BDO badges
  const pendingForSO  = clerks.filter(c => getWf(c.id).status === "forwarded_so").length;
  const pendingForBDO = clerks.filter(c => getWf(c.id).status === "forwarded_bdo").length;
  const myWf = user?.role === "clerk" ? getWf(user.id) : null;

  const tabs = [
    { id: "worksheet",    label: "📋 कार्य विवरण",       show: true },
    { id: "gmail",        label: "📧 Gmail पत्रे",       show: user.role === "clerk" },
    { id: "download",     label: "⬇️ डाउनलोड (PDF/Excel)", show: user.role === "clerk" },
    { id: "forward",      label: "📤 पाठवा",             show: user.role === "clerk",
      badge: myWf?.status === "so_returned" || myWf?.status === "bdo_returned" ? "!" : 0, badgeColor: RD },
    { id: "instructions", label: "📝 सूचना",             show: user.role === "clerk",
      badge: (myWf?.soInstruction || myWf?.bdoInstruction) ? "●" : 0, badgeColor: AM },
    { id: "so_inbox",     label: "📥 वर्कशीट पहा",       show: user.role === "so",
      badge: pendingForSO, badgeColor: G },
    { id: "bdo_inbox",    label: "📥 वर्कशीट पहा",       show: user.role === "bdo",
      badge: pendingForBDO, badgeColor: G },
    { id: "print",        label: "🖨️ मुद्रण (PDF/Excel)",  show: user.role === "clerk" },
    { id: "await",        label: "⏳ Await Register",     show: true, badge: awaitLetters.length, badgeColor: RD },
    { id: "approve",      label: "✅ मंजुरी",             show: user.role === "ac" },
    { id: "abstract",     label: "📊 सारांश",             show: true },
    { id: "all",          label: "👥 सर्व लिपिक",         show: canSuper },
    { id: "users",        label: "⚙️ वापरकर्ते",           show: canAC },
    { id: "depts",        label: "🏢 विभाग",              show: canAC },
  ];

  const init = user.name.replace(/श्री[मती]* /, "").slice(0, 2);
  const roleColors = { clerk: "#E6F1FB", so: "#EAF3DE", bdo: AML, ac: "#FBEAF0" };
  const roleTextColors = { clerk: "#042C53", so: "#173404", bdo: "#412402", ac: "#4B1528" };

  return (
    <div style={s.app}>
      {/* HEADER */}
      <div style={s.hdr}>
        <div style={s.hLogo}>📋</div>
        <div>
          <div style={s.hTitle}>{APP}</div>
          <div style={s.hSub}>{OFFICE}</div>
        </div>
        <div style={s.hRight}>
          <div style={s.userPill}>
            <div style={s.avatar}>{init}</div>
            <span>{user.name.split(" ").slice(-1)[0]}</span>
            <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 8, background: roleColors[user.role], color: roleTextColors[user.role], fontWeight: 600 }}>{ROLES[user.role]}</span>
          </div>
          <button style={s.btnS} onClick={() => setUser(null)}>बाहेर पडा</button>
        </div>
      </div>

      {/* NAV */}
      <div style={s.nav}>
        {tabs.filter(t => t.show).map(t => (
          <div key={t.id} style={tab === t.id ? s.navTabActive : s.navTab} onClick={() => setTab(t.id)}>
            {t.label}
            {t.badge > 0 && <span style={{ background: t.badgeColor || RD, color: "#fff", fontSize: 9, padding: "1px 5px", borderRadius: 8, fontWeight: 700 }}>{t.badge}</span>}
          </div>
        ))}
      </div>

      {/* MAIN */}
      <div style={s.main}>
        {tab === "worksheet"    && <WorksheetTab letters={myLetters} allLetters={letters} user={user} clerks={clerks} getClerk={getClerk} setModal={setModal} />}
        {tab === "gmail"        && <GmailTab user={user} threads={gmailThreads} loading={gmailLoading} filter={gmailFilter} setFilter={setGmailFilter} letters={letters} onFetch={fetchGmail} onImport={(t) => setModal({ type: "import_gmail", data: t })} />}
        {tab === "download"     && <DownloadTab user={user} threads={gmailThreads} loading={gmailLoading} onFetch={fetchGmail} />}
        {tab === "forward"      && <ForwardTab user={user} letters={myLetters} wf={getWf(user.id)} onForward={() => forwardToSO(user.id)} />}
        {tab === "instructions" && <InstructionsTab wf={getWf(user.id)} user={user} />}
        {tab === "so_inbox"     && <SOInboxTab clerks={clerks} letters={letters} workflows={workflows} getWf={getWf} soReview={soReview} />}
        {tab === "bdo_inbox"    && <BDOInboxTab clerks={clerks} letters={letters} workflows={workflows} getWf={getWf} bdoDecide={bdoDecide} />}
        {tab === "print"        && <PrintTab letters={myLetters} user={user} getClerk={getClerk} />}
        {tab === "await"        && <AwaitTab awaitLetters={awaitLetters} getClerk={getClerk} setModal={setModal} />}
        {tab === "approve"      && <ApproveTab letters={letters} approvals={approvals} user={user} clerks={clerks} getClerk={getClerk} doApprove={doApprove} awaitLetters={awaitLetters} />}
        {tab === "abstract"     && <AbstractTab letters={letters} clerks={clerks} getClerk={getClerk} absTab={absTab} setAbsTab={setAbsTab} />}
        {tab === "all"          && <AllTab letters={letters} clerks={clerks} getClerk={getClerk} />}
        {tab === "users"        && <UsersTab users={users} clerks={clerks} setModal={setModal} removeClerk={removeClerk} />}
        {tab === "depts"        && <DeptsTab depts={depts} clerks={clerks} users={users} letters={letters} setModal={setModal} removeDept={removeDept} toggleDeptClerk={toggleDeptClerk} />}
      </div>

      {/* MODALS */}
      {modal?.type === "add" && <AddLetterModal user={user} clerks={clerks} onSave={addLetter} onClose={closeModal} />}
      {modal?.type === "import_gmail" && <ImportGmailModal thread={modal.data} user={user} onSave={importGmailLetter} onClose={closeModal} />}
      {modal?.type === "edit" && <EditActionModal letter={modal.data} onSave={saveAction} onClose={closeModal} />}
      {modal?.type === "view" && <ViewModal letter={modal.data} getClerk={getClerk} onClose={closeModal} />}
      {modal?.type === "await_edit" && <AwaitEditModal letter={modal.data} onSave={saveAwait} onClose={closeModal} />}
      {modal?.type === "add_clerk" && <AddClerkModal onSave={addClerk} onClose={closeModal} />}
      {modal?.type === "edit_clerk" && <EditClerkModal clerk={modal.data} onSave={editClerk} onClose={closeModal} />}
      {modal?.type === "add_dept" && <AddDeptModal onSave={addDept} onClose={closeModal} />}
      {modal?.type === "edit_dept" && <EditDeptModal dept={modal.data} clerks={clerks} onSave={editDept} onClose={closeModal} toggleClerk={toggleDeptClerk} />}
    </div>
  );
}

function WorksheetTab({ letters, allLetters, user, clerks, getClerk, setModal }) {
  const total = letters.length, taken = letters.filter(l => l.status === "action_taken").length;
  const pending = letters.filter(l => l.status === "pending").length;
  const urgent = letters.filter(l => l.priority === "तातडीचे" && l.status === "pending").length;
  return (
    <>
      <DriveBanner />
      <div style={s.statRow}>
        <StatCard label="एकूण पत्रे" value={total} />
        <StatCard label="कार्यवाही झाली" value={taken} color={G} />
        <StatCard label="प्रलंबित" value={pending} color={AM} />
        <StatCard label="तातडीचे" value={urgent} color={RD} />
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 6 }}>
        <div style={{ fontSize: 11, color: "#888" }}>सर्व नोंदी</div>
        {user.role === "clerk" && <button style={s.btnP} onClick={() => setModal({ type: "add" })}>➕ नवीन नोंद</button>}
      </div>
      <div style={s.card}>
        <div style={s.cardHead}>
          <span>📋</span><div style={s.cardTitle}>कार्य विवरण नोंदी</div>
          <Badge type={pending > 0 ? "a" : "g"}>{pending > 0 ? `${pending} प्रलंबित` : "सर्व पूर्ण"}</Badge>
        </div>
        <Tbl
          heads={["दिनांक", "संदर्भ व विषय", "विभाग", "लिपिक", { label: "दिवस", center: true }, "स्थिती", ""]}
          rows={letters.length ? letters.map(l => {
            const clerk = getClerk(l.clerkId), days = daysDiff(l.date), isAwait = l.status === "pending" && days >= AWAIT_DAYS;
            return (
              <tr key={l.id} style={{ background: isAwait ? "#fff8f8" : undefined }}>
                <td style={{ ...s.td, fontSize: 10, color: "#888", whiteSpace: "nowrap" }}>{l.date}</td>
                <td style={s.td}>
                  <div style={{ fontSize: 9, color: "#aaa" }}>{l.ref}</div>
                  <div>{l.subject.length > 36 ? l.subject.slice(0, 36) + "…" : l.subject}</div>
                  <div style={{ fontSize: 9, color: "#aaa" }}>{l.from}</div>
                </td>
                <td style={s.td}><span style={s.ctag}>{l.section}</span></td>
                <td style={{ ...s.td, fontSize: 10 }}>{clerk.name.replace(/श्री[मती]* /, "")}</td>
                <td style={{ ...s.td, textAlign: "center" }}>
                  <span style={{ fontSize: 10, fontWeight: 700, color: isAwait ? RD : days >= 7 ? AM : "#888" }}>{days}d</span>
                  {isAwait && <div><Badge type="aw">Await</Badge></div>}
                </td>
                <td style={s.td}>
                  {l.status === "action_taken"
                    ? <span style={{ color: G, fontSize: 10, fontWeight: 600 }}>✓ पूर्ण</span>
                    : <span style={{ color: AM, fontSize: 10 }}>⏳ प्रलंबित</span>}
                  {l.priority === "तातडीचे" && <div style={{ marginTop: 2 }}><Badge type="r">तातडी</Badge></div>}
                </td>
                <td style={s.td}>
                  {user.role === "clerk" && l.clerkId === user.id
                    ? <button style={{ ...s.btnS, fontSize: 10, padding: "2px 8px" }} onClick={() => setModal({ type: "edit", data: l })}>✏️</button>
                    : <button style={{ ...s.btnS, fontSize: 10, padding: "2px 8px" }} onClick={() => setModal({ type: "view", data: l })}>👁</button>}
                </td>
              </tr>
            );
          }) : [<tr key="e"><td colSpan={7} style={{ ...s.td, textAlign: "center", color: "#aaa", padding: 24 }}>कोणत्याही नोंदी नाहीत</td></tr>]}
        />
      </div>
    </>
  );
}

          : <Tbl
              heads={["प्राप्त दिनांक", "संदर्भ व विषय", "विभाग", "लिपिक", { label: "दिवस", center: true }, "प्राधान्य", "कारण", "रिमाइंडर", ""]}
              rows={awaitLetters.map(l => {
                const clerk = getClerk(l.clerkId);
                return (
                  <tr key={l.id}>
                    <td style={{ ...s.td, color: RD, fontWeight: 700, fontSize: 10, whiteSpace: "nowrap" }}>{l.date}</td>

                      <div style={{ fontSize: 9, color: "#aaa" }}>{l.ref}</div>

    <>
      {/* Current status banner */}
      <div style={{ background: wfInfo.bg, border: `1px solid ${wfInfo.color}`, borderRadius: 8, padding: "12px 16px", marginBottom: 14, display: "flex", alignItems: "center", gap: 12 }}>
        <span style={{ fontSize: 24 }}>{status === "bdo_approved" ? "✅" : status.includes("returned") ? "↩️" : status === "draft" ? "📝" : "📤"}</span>
        <div>
          <div style={{ fontWeight: 700, color: wfInfo.color, fontSize: 13 }}>{wfInfo.label}</div>
          {wf.forwardedAt   && <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>विभाग अधिकाऱ्याकडे पाठवले: {wf.forwardedAt}</div>}
          {wf.soReviewedAt  && <div style={{ fontSize: 10, color: "#888" }}>विभाग अधिकाऱ्याने पाहिले: {wf.soReviewedAt}</div>}
          {wf.bdoDecidedAt  && <div style={{ fontSize: 10, color: "#888" }}>BDO निर्णय: {wf.bdoDecidedAt}</div>}
        </div>
      </div>

      {/* Approval flow diagram */}
      <div style={{ display: "flex", marginBottom: 14 }}>
        {[
          { label: "लिपिक", sub: "नोंदी तयार करतो", done: true },
          { label: "विभाग अधिकारी", sub: "तपासणी व सूचना", done: ["forwarded_bdo","bdo_approved","bdo_returned"].includes(status) },
          { label: "BDO", sub: "अंतिम मंजुरी", done: status === "bdo_approved" },
        ].map((step, i) => (
          <div key={i} style={{ flex: 1, padding: "9px 10px", textAlign: "center", fontSize: 10, border: "1px solid #e0e0d8", background: step.done ? "#EAF3DE" : "#f8f8f4", color: step.done ? "#173404" : "#888", borderLeft: i > 0 ? "none" : undefined, borderRadius: i === 0 ? "8px 0 0 8px" : i === 2 ? "0 8px 8px 0" : 0 }}>
            <div style={{ fontWeight: 700 }}>{step.done ? "✓ " : ""}{step.label}</div>
            <div style={{ fontSize: 9, marginTop: 2, opacity: 0.7 }}>{step.sub}</div>
          </div>
        ))}
      </div>

      {/* Summary */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginBottom: 14 }}>
        <StatCard label="एकूण नोंदी" value={total} />
        <StatCard label="कार्यवाही झाली" value={taken} color={G} />
        <StatCard label="प्रलंबित" value={pending} color={AM} />
      </div>

      {/* SO instruction (if returned) */}
      {wf.soInstruction && (
        <div style={{ background: "#FFF8E1", border: "1px solid #FBC02D", borderRadius: 8, padding: "10px 14px", marginBottom: 12 }}>
          <div style={{ fontWeight: 700, fontSize: 11, marginBottom: 4, color: "#5D4037" }}>📝 विभाग अधिकाऱ्याच्या सूचना:</div>
          <div style={{ fontSize: 12 }}>{wf.soInstruction}</div>
          {wf.soReviewedAt && <div style={{ fontSize: 10, color: "#888", marginTop: 5 }}>— {wf.soReviewedAt}</div>}
        </div>
      )}

      {/* BDO instruction (if returned) */}
      {wf.bdoInstruction && (
        <div style={{ background: RDL, border: `1px solid #F09595`, borderRadius: 8, padding: "10px 14px", marginBottom: 12 }}>
          <div style={{ fontWeight: 700, fontSize: 11, marginBottom: 4, color: RD }}>📝 BDO च्या सूचना:</div>
          <div style={{ fontSize: 12 }}>{wf.bdoInstruction}</div>
          {wf.bdoDecidedAt && <div style={{ fontSize: 10, color: "#888", marginTop: 5 }}>— {wf.bdoDecidedAt}</div>}
        </div>
      )}

      {/* Forward button */}
      <div style={s.card}>
        <div style={s.cardHead}><span>📤</span><div style={s.cardTitle}>कार्य विवरण पाठवा</div></div>
        <div style={{ padding: 16 }}>
          {canFwd ? (
            <>
              <div style={{ fontSize: 12, color: "#555", marginBottom: 12, lineHeight: 1.7 }}>
                {status === "draft"
                  ? "तुमच्या कार्य विवरणातील सर्व नोंदी विभाग अधिकाऱ्याकडे तपासणीसाठी पाठवा. पाठवल्यानंतर विभाग अधिकारी त्यांच्या लॉगिनमध्ये पाहू शकतील."
                  : "कार्य विवरण परत आले आहे. सूचनांनुसार दुरुस्त करून पुन्हा पाठवा."}
              </div>
              {total === 0
                ? <div style={{ background: AML, borderRadius: 7, padding: "10px 12px", fontSize: 11, color: "#412402" }}>⚠️ कार्य विवरणात कोणत्याही नोंदी नाहीत. प्रथम <b>📋 कार्य विवरण</b> टॅबमध्ये नोंदी जोडा.</div>
                : <button style={{ ...s.btnP, fontSize: 13, padding: "10px 24px" }} onClick={onForward}>📤 विभाग अधिकाऱ्याकडे पाठवा</button>}
            </>
          ) : status === "forwarded_so" ? (
            <div style={{ fontSize: 12, color: "#555" }}>✅ कार्य विवरण विभाग अधिकाऱ्याकडे पाठवले आहे. त्यांच्या तपासणीची प्रतीक्षा करा.</div>
          ) : status === "forwarded_bdo" ? (
            <div style={{ fontSize: 12, color: "#555" }}>✅ कार्य विवरण BDO कडे पाठवले आहे. अंतिम मंजुरीची प्रतीक्षा करा.</div>
          ) : (
            <div style={{ fontSize: 12, color: G, fontWeight: 700 }}>🎉 BDO ने तुमचे कार्य विवरण मंजूर केले आहे!</div>
          )}
        </div>
      </div>
    </>
  );
}

        <div style={{ ...s.card, width: 220, flexShrink: 0, marginBottom: 0 }}>

            const wf = getWf(c.id); const wfI = WF_LABELS[wf.status] || WF_LABELS.draft;

              <div key={c.id} onClick={() => { setSelected(c.id); setInstruction(wf.soInstruction || ""); }} style={{ padding: "10px 12px", borderBottom: "1px solid #f0f0e8", cursor: "pointer", background: selected === c.id ? GL : "#fff", borderLeft: selected === c.id ? `3px solid ${G}` : "3px solid transparent" }}>

                  rows={selLetters.length ? selLetters.map(l => (

              {selWf.status === "forwarded_so" && (
                <div style={s.card}>
                  <div style={s.cardHead}><span>✅</span><div style={s.cardTitle}>आपला निर्णय</div></div>

                  {selWf.soInstruction && <><br /><br /><b>आपल्या सूचना:</b> {selWf.soInstruction}</>}
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </>
  );
}

                </div>

                      <td style={s.td}>{l.status === "action_taken" ? <Badge type="g">✓ पूर्ण</Badge> : <Badge type="a">प्रलंबित</Badge>}</td>

                <div style={s.card}>

                    <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                      {[["approved","✅ मंजूर करा"],["returned","↩️ परत पाठवा"]].map(([v, lbl]) => (
                        <div key={v} onClick={() => setDecision(v)} style={{ flex: 1, padding: "10px 12px", borderRadius: 7, border: `2px solid ${decision === v ? (v === "approved" ? G : RD) : "#d0d0c8"}`, background: decision === v ? (v === "approved" ? GL : RDL) : "#fff", cursor: "pointer", textAlign: "center", fontSize: 12, fontWeight: decision === v ? 700 : 400 }}>
                          {lbl}
                        </div>
                      ))}
                    </div>
                    <FormField label="सूचना / शेरा (ऐच्छिक)">
                      <textarea style={{ ...s.input, minHeight: 70, resize: "vertical" }} value={instruction} onChange={e => setInstruction(e.target.value)} placeholder="लिपिकाला सूचना / अभिप्राय..." />
                    </FormField>
                    <button style={{ ...s.btnP, background: decision === "approved" ? G : RD, fontSize: 12, padding: "8px 20px" }} onClick={() => { bdoDecide(sel.id, decision, instruction); setSelected(null); }}>
                      {decision === "approved" ? "✅ मंजूर करा" : "↩️ परत पाठवा"}
                    </button>
                  </div>
                </div>
              ) : (
                <div style={{ background: selWf.status === "bdo_approved" ? GL : RDL, borderRadius: 8, padding: 12, fontSize: 12, color: selWf.status === "bdo_approved" ? G : RD, fontWeight: 700 }}>
                  {selWf.status === "bdo_approved" ? "✅ मंजूर केले" : "↩️ परत पाठवले"}
                  {selWf.bdoInstruction && <div style={{ fontWeight: 400, color: "#555", marginTop: 6 }}>सूचना: {selWf.bdoInstruction}</div>}
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </>
  );
}

// GMAIL TAB (clerk only)
// ============================================================
function GmailTab({ user, threads, loading, filter, setFilter, letters, onFetch, onImport }) {
  const isImported = (t) => letters.some(l => l.gmailId === t.id);
  const filtered = filter === "imported" ? threads.filter(t => isImported(t))
    : filter === "new" ? threads.filter(t => !isImported(t))
    : threads;
  const newCount = threads.filter(t => !isImported(t)).length;

          <span>📨</span>

          <span style={{ fontSize: 10, color: "#888" }}>{filtered.length} ईमेल</span>

        {!loading && filtered.length === 0 && (

// ============================================================
// PRINT TAB (clerk only) — PDF + Excel download
// ============================================================
function PrintTab({ letters, user, getClerk }) {
  const [printType, setPrintType]     = useState("weekly");
  const [reportType, setReportType]   = useState("abstract");  // "abstract" | "detail"
  const [exportFmt, setExportFmt]     = useState("pdf");        // "pdf" | "excel"
  const [fromDate, setFromDate]       = useState("2025-01-20");
  const [toDate, setToDate]           = useState("2025-01-27");
  const [weekOffset, setWeekOffset]   = useState(0);

  const weekStarts = ["2025-01-06","2025-01-13","2025-01-20","2025-01-27"];
  const weekLabels = ["आठवडा १ (०६–१२ जाने)","आठवडा २ (१३–१९ जाने)","आठवडा ३ (२०–२६ जाने)","आठवडा ४ (२७ जाने+)"];

  const getFiltered = () => {
    if (printType === "weekly") {
      const ws = weekStarts[weekOffset], we = weekOffset < 3 ? weekStarts[weekOffset + 1] : "2099-12-31";
      return letters.filter(l => l.date >= ws && l.date < we);
    }
    return letters.filter(l => l.date >= fromDate && l.date <= toDate);
  };

  const filtered    = getFiltered();
  const taken       = filtered.filter(l => l.status === "action_taken").length;
  const pending     = filtered.filter(l => l.status === "pending").length;
  const urgent      = filtered.filter(l => l.priority === "तातडीचे").length;
  const pct         = filtered.length ? Math.round(taken / filtered.length * 100) : 0;
  const periodLabel = printType === "weekly" ? weekLabels[weekOffset] : `${fromDate} ते ${toDate}`;
  const now         = new Date().toLocaleDateString("mr-IN");
  const fname       = `कार्य_विवरण_${user.username}_${printType === "weekly" ? "आठवडा" + (weekOffset + 1) : fromDate}`;

  // ── PDF via print dialog ────────────────────────────────────
  const buildHtml = () => {
    const abstractRows = `
      <div class="stats">
        <div class="stat"><div class="sv">${filtered.length}</div><div class="sl">एकूण पत्रे</div></div>
        <div class="stat"><div class="sv" style="color:#0F6E56">${taken}</div><div class="sl">कार्यवाही झाली</div></div>
        <div class="stat"><div class="sv" style="color:#BA7517">${pending}</div><div class="sl">प्रलंबित</div></div>
        <div class="stat"><div class="sv" style="color:#A32D2D">${urgent}</div><div class="sl">तातडीचे</div></div>
        <div class="stat"><div class="sv" style="color:#0F6E56">${pct}%</div><div class="sl">निपटारा दर</div></div>
        <div class="stat"><div class="sv">${filtered.length > 0 ? Math.max(...filtered.map(l => l.date)) : "—"}</div><div class="sl">शेवटची नोंद</div></div>
      </div>`;

    const detailRows = filtered.map((l, i) => `
      <tr class="${l.priority === "तातडीचे" ? "urg" : ""}">
        <td style="text-align:center;width:24px">${i + 1}</td>
        <td style="width:76px">${l.date}</td>
        <td style="width:105px">${l.ref}</td>
        <td>${l.subject}</td>
        <td style="width:115px">${l.from}</td>
        <td style="width:86px">${l.section}</td>
        <td class="${l.status === "action_taken" ? "done" : "pend"}" style="width:72px">${l.status === "action_taken" ? "✓ पूर्ण" : "प्रलंबित"}</td>
        <td style="width:125px">${l.action || "—"}</td>
      </tr>`).join("");

    const body = reportType === "abstract"
      ? `<div class="sec-title">सारांश (Abstract)</div>${abstractRows}
         <div class="sec-title" style="margin-top:16px">विभागनिहाय तपशील</div>
         <table><thead><tr><th>विभाग</th><th>एकूण</th><th>कार्यवाही</th><th>प्रलंबित</th><th>%</th></tr></thead><tbody>
         ${[...new Set(filtered.map(l => l.section))].map(sec => {
           const sl = filtered.filter(l => l.section === sec);
           const sa = sl.filter(l => l.status === "action_taken").length;
           return `<tr><td>${sec}</td><td>${sl.length}</td><td>${sa}</td><td>${sl.length - sa}</td><td>${sl.length ? Math.round(sa / sl.length * 100) : 0}%</td></tr>`;
         }).join("") || '<tr><td colspan="5" style="text-align:center;color:#999">नोंदी नाहीत</td></tr>'}
         </tbody></table>`
      : `<div class="sec-title">पत्रांचा संपूर्ण तपशील</div>
         <table><thead><tr><th>#</th><th>दिनांक</th><th>संदर्भ</th><th>विषय</th><th>पाठवणारे</th><th>विभाग</th><th>स्थिती</th><th>केलेली कार्यवाही</th></tr></thead>
         <tbody>${detailRows || '<tr><td colspan="8" style="text-align:center;padding:12px;color:#999">नोंदी नाहीत</td></tr>'}</tbody></table>`;

    return `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <style>
      @page{size:A4 landscape;margin:12mm}
      *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
      body{font-size:10px;color:#000}
      .hdr{text-align:center;border-bottom:2px solid #0F6E56;padding-bottom:8px;margin-bottom:10px}
      .hdr h1{font-size:14px;font-weight:bold;color:#0F6E56}
      .hdr h2{font-size:11px;margin-top:3px}
      .hdr h3{font-size:10px;color:#555;margin-top:2px}
      .meta{display:flex;justify-content:space-between;margin-bottom:10px;font-size:9px;color:#555;border-bottom:1px dashed #ccc;padding-bottom:6px}
      .sec-title{font-size:11px;font-weight:bold;margin:10px 0 6px;border-bottom:1px solid #0F6E56;padding-bottom:2px;color:#0F6E56}
      .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:10px}
      .stat{border:1px solid #d0d0c8;border-radius:5px;padding:7px;text-align:center}
      .sv{font-size:18px;font-weight:bold}
      .sl{font-size:8px;color:#666;margin-top:2px}
      table{width:100%;border-collapse:collapse;font-size:9px}
      th{background:#0F6E56;color:#fff;padding:5px 6px;text-align:left;font-size:9px}
      td{padding:4px 6px;border-bottom:1px solid #eee;vertical-align:top}
      tr:nth-child(even)td{background:#f9f9f9}
      .urg td{background:#fff8f8!important}
      .done{color:#0F6E56;font-weight:bold}
      .pend{color:#BA7517;font-weight:bold}
      .footer{margin-top:16px;border-top:1px solid #000;padding-top:8px;display:flex;justify-content:space-around}
      .sig-box{text-align:center}
      .sig-line{border-top:1px solid #000;width:140px;margin:26px auto 4px}
    </style></head><body>
    <div class="hdr">
      <h1>${APP}</h1>
      <h2>${OFFICE}</h2>
      <h3>${reportType === "abstract" ? "साप्ताहिक सारांश अहवाल" : "पत्र तपशील अहवाल"} — ${periodLabel}</h3>
    </div>
    <div class="meta">
      <span><b>लिपिक:</b> ${user.name}</span>
      <span><b>विभाग:</b> ${user.section}</span>
      <span><b>अहवाल प्रकार:</b> ${reportType === "abstract" ? "सारांश" : "संपूर्ण तपशील"}</span>
      <span><b>मुद्रण दिनांक:</b> ${now}</span>
    </div>
    ${body}
    <div class="footer">
      <div class="sig-box"><div class="sig-line"></div>लिपिकाची स्वाक्षरी<br/><small>${user.name}</small></div>
      <div class="sig-box"><div class="sig-line"></div>विभाग अधिकाऱ्याची स्वाक्षरी</div>
      <div class="sig-box"><div class="sig-line"></div>BDO स्वाक्षरी</div>
      <div class="sig-box"><div class="sig-line"></div>अपर आयुक्तांची स्वाक्षरी</div>
    </div>
    </body></html>`;
  };

  const downloadPdf = () => {
    const html = buildHtml();
    const win = window.open("", "_blank");
    if (!win) { alert("Popup blocked. Please allow popups for this site."); return; }
    win.document.write(html);
    win.document.close();
    win.focus();
    setTimeout(() => {
      win.print();
      // Browser "Save as PDF" dialog will appear via print
    }, 600);
  };

  // ── Excel via CSV (universally opens in MS Excel) ───────────
  const downloadExcel = () => {
    const BOM = "\uFEFF";
    const esc = v => `"${String(v || "").replace(/"/g, '""')}"`;

    // Sheet 1: Abstract
    let csv = `${BOM}${APP}\r\n${OFFICE}\r\n`;
    csv += `कार्य विवरण अहवाल — ${periodLabel}\r\n`;
    csv += `लिपिक: ${user.name},विभाग: ${user.section},मुद्रण दिनांक: ${now}\r\n\r\n`;
    csv += `साप्ताहिक सारांश\r\n`;
    csv += `एकूण पत्रे,कार्यवाही झाली,प्रलंबित,तातडीचे,निपटारा %\r\n`;
    csv += `${filtered.length},${taken},${pending},${urgent},${pct}%\r\n\r\n`;

    // Section-wise
    csv += `विभागनिहाय तपशील\r\n`;
    csv += `विभाग,एकूण,कार्यवाही,प्रलंबित,निपटारा %\r\n`;
    const secs = [...new Set(filtered.map(l => l.section))];
    secs.forEach(sec => {
      const sl = filtered.filter(l => l.section === sec);
      const sa = sl.filter(l => l.status === "action_taken").length;
      csv += `${sec},${sl.length},${sa},${sl.length - sa},${sl.length ? Math.round(sa / sl.length * 100) : 0}%\r\n`;
    });

    // Detail rows
    csv += `\r\nपत्र तपशील\r\n`;
    csv += `अनुक्रमांक,प्राप्त दिनांक,संदर्भ क्रमांक,पत्राचा विषय,पाठवणारे कार्यालय,विभाग,स्थिती,प्राधान्य,केलेली कार्यवाही,कार्यवाही दिनांक\r\n`;
    filtered.forEach((l, i) => {
      csv += `${i + 1},${l.date},${esc(l.ref)},${esc(l.subject)},${esc(l.from)},${esc(l.section)},`;
      csv += `${l.status === "action_taken" ? "कार्यवाही झाली" : "प्रलंबित"},${l.priority},${esc(l.action)},${l.actionDate}\r\n`;
    });

    // Signature rows
    csv += `\r\n\r\nलिपिकाची स्वाक्षरी,,,विभाग अधिकाऱ्याची स्वाक्षरी,,,BDO स्वाक्षरी,,,अपर आयुक्तांची स्वाक्षरी\r\n`;
    csv += `${user.name},,,,,,,,\r\n`;

    const blob = new Blob([csv], { type: "application/vnd.ms-excel;charset=utf-8" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `${fname}.xls`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const doExport = () => exportFmt === "pdf" ? downloadPdf() : downloadExcel();

  // ── Render ─────────────────────────────────────────────────
  return (
    <>
      {/* Top banner */}
      <div style={{ background: AML, border: `1px solid ${AM}`, borderRadius: 7, padding: "8px 12px", marginBottom: 12, fontSize: 11, color: "#412402", display: "flex", alignItems: "center", gap: 8 }}>
        🖨️ <span>कार्य विवरण अहवाल डाउनलोड करा — <b>PDF</b> किंवा <b>MS Excel</b> फॉर्मॅटमध्ये</span>
      </div>

      {/* Settings card */}
      <div style={s.card}>
        <div style={s.cardHead}><span>⚙️</span><div style={s.cardTitle}>अहवाल सेटिंग्ज</div></div>
        <div style={{ padding: 14, display: "flex", flexDirection: "column", gap: 14 }}>

          {/* Row 1 — period type */}
          <div>
            <label style={s.label}>📅 कालावधी प्रकार</label>
            <div style={{ display: "flex", gap: 8 }}>
              {[["weekly","📅 साप्ताहिक"],["custom","📆 कालावधी निवडा"]].map(([v, lbl]) => (
                <button key={v} style={{ ...s.btnS, ...(printType === v ? { background: G, color: "#fff", border: `1px solid ${G}`, fontWeight: 700 } : {}) }} onClick={() => setPrintType(v)}>{lbl}</button>
              ))}
            </div>
          </div>

          {/* Week selector */}
          {printType === "weekly" && (
            <div>
              <label style={s.label}>आठवडा निवडा</label>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 8 }}>
                {weekLabels.map((wl, i) => {
                  const cnt = (() => { const ws2 = weekStarts[i], we2 = i < 3 ? weekStarts[i+1] : "2099-12-31"; return letters.filter(l => l.date >= ws2 && l.date < we2).length; })();
                  return (
                    <div key={i} onClick={() => setWeekOffset(i)} style={{ padding: "9px 12px", borderRadius: 7, border: `1px solid ${weekOffset === i ? G : "#d0d0c8"}`, background: weekOffset === i ? GL : "#fff", cursor: "pointer", fontSize: 11, fontWeight: weekOffset === i ? 700 : 400, color: weekOffset === i ? "#04342C" : "#555" }}>
                      {weekOffset === i ? "✓ " : ""}{wl}
                      <div style={{ fontSize: 10, color: "#aaa", marginTop: 2 }}>{cnt} नोंदी</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Custom date range */}
          {printType === "custom" && (
            <div style={s.fgRow}>
              <FormField label="सुरुवात दिनांक"><input style={s.input} type="date" value={fromDate} onChange={e => setFromDate(e.target.value)} /></FormField>
              <FormField label="शेवट दिनांक"><input style={s.input} type="date" value={toDate} onChange={e => setToDate(e.target.value)} /></FormField>
            </div>
          )}

          {/* Row 2 — report type */}
          <div>
            <label style={s.label}>📄 अहवाल प्रकार</label>
            <div style={{ display: "flex", gap: 8 }}>
              {[["abstract","📊 सारांश (Abstract)"],["detail","📋 संपूर्ण तपशील"]].map(([v, lbl]) => (
                <button key={v} style={{ ...s.btnS, ...(reportType === v ? { background: G, color: "#fff", border: `1px solid ${G}`, fontWeight: 700 } : {}) }} onClick={() => setReportType(v)}>{lbl}</button>
              ))}
            </div>
            <div style={{ fontSize: 10, color: "#888", marginTop: 5 }}>
              {reportType === "abstract" ? "एकूण / पूर्ण / प्रलंबित + विभागनिहाय सारांश" : "प्रत्येक पत्राचा संपूर्ण तपशील, कार्यवाही, दिनांक"}
            </div>
          </div>

          {/* Row 3 — export format */}
          <div>
            <label style={s.label}>💾 डाउनलोड फॉर्मॅट</label>
            <div style={{ display: "flex", gap: 8 }}>
              <div onClick={() => setExportFmt("pdf")} style={{ flex: 1, padding: "12px 14px", borderRadius: 8, border: `2px solid ${exportFmt === "pdf" ? RD : "#d0d0c8"}`, background: exportFmt === "pdf" ? "#FFF5F5" : "#fff", cursor: "pointer", textAlign: "center" }}>
                <div style={{ fontSize: 24, marginBottom: 4 }}>📕</div>

            <StatCard label="प्रलंबित" value={pending} color={AM} />

            </div>

// ============================================================
// DOWNLOAD TAB (clerk — download Gmail letters as PDF or Excel)
// ============================================================
function DownloadTab({ user, threads, loading, onFetch }) {
  const [downloaded, setDownloaded]     = useState(new Set());
  const [dlFmt, setDlFmt]               = useState("pdf"); // "pdf" | "excel"
  const [selectAll, setSelectAll]       = useState(false);
  const [selected, setSelected]         = useState(new Set());

  const toggleThread = (id) => setSelected(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const toggleAll    = () => { if (selectAll) { setSelected(new Set()); setSelectAll(false); } else { setSelected(new Set(threads.map(t => t.id))); setSelectAll(true); } };

  const buildLetterHtml = (list) => {
    const rows = list.map((t, i) => `
      <tr>
        <td style="text-align:center;width:24px">${i + 1}</td>
        <td style="width:86px">${t.date}</td>
        <td>${t.subject}</td>
        <td style="width:160px">${t.from}</td>
        <td>${t.snippet || "—"}</td>
      </tr>`).join("");
    return `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <style>
      @page{size:A4;margin:14mm}*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
      body{font-size:10px}
      .hdr{text-align:center;border-bottom:2px solid #0F6E56;padding-bottom:7px;margin-bottom:10px}
      .hdr h1{font-size:13px;font-weight:bold;color:#0F6E56}.hdr h2{font-size:10px;margin-top:3px}
      .meta{display:flex;justify-content:space-between;font-size:9px;color:#555;margin-bottom:10px}
      table{width:100%;border-collapse:collapse;font-size:9px}
      th{background:#0F6E56;color:#fff;padding:5px 6px;text-align:left}
      td{padding:4px 6px;border-bottom:1px solid #eee;vertical-align:top}
      tr:nth-child(even)td{background:#f9f9f9}
    </style></head><body>
    <div class="hdr"><h1>${APP}</h1><h2>${OFFICE}</h2></div>
    <div class="meta"><span><b>लिपिक:</b> ${user.name}</span><span><b>विभाग:</b> ${user.section}</span><span><b>Gmail:</b> dycomest11@gmail.com</span><span><b>दिनांक:</b> ${new Date().toLocaleDateString("mr-IN")}</span></div>
    <table><thead><tr><th>#</th><th>दिनांक</th><th>विषय</th><th>पाठवणारे</th><th>सारांश</th></tr></thead>
    <tbody>${rows || '<tr><td colspan="5" style="text-align:center;color:#999">कोणते ईमेल निवडले नाहीत</td></tr>'}</tbody></table>
    </body></html>`;
  };

  const buildLetterCsv = (list) => {
    const BOM = "\uFEFF";
    let csv = `${BOM}${APP}\r\n${OFFICE}\r\n`;
    csv += `Gmail ईमेल यादी — dycomest11@gmail.com\r\n`;
    csv += `लिपिक: ${user.name},विभाग: ${user.section},डाउनलोड: ${new Date().toLocaleDateString("mr-IN")}\r\n\r\n`;
    csv += `अनुक्रमांक,दिनांक,विषय,पाठवणारे,सारांश,Gmail ID\r\n`;
    list.forEach((t, i) => {
      const esc = v => `"${String(v || "").replace(/"/g, '""')}"`;
      csv += `${i + 1},${t.date},${esc(t.subject)},${esc(t.from)},${esc(t.snippet)},${t.id}\r\n`;
    });
    return csv;
  };

  const downloadSelected = () => {
    const list = threads.filter(t => selected.has(t.id));
    if (!list.length) { alert("कृपया किमान एक ईमेल निवडा"); return; }
    if (dlFmt === "pdf") {
      const win = window.open("", "_blank");
      if (!win) { alert("Popup blocked. Please allow popups."); return; }
      win.document.write(buildLetterHtml(list));
      win.document.close();
      win.focus();
      setTimeout(() => win.print(), 500);
    } else {
      const csv  = buildLetterCsv(list);
      const blob = new Blob([csv], { type: "application/vnd.ms-excel;charset=utf-8" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = `Gmail_पत्रे_${user.username}_${new Date().toISOString().slice(0,10)}.xls`;
      a.click();
      URL.revokeObjectURL(url);
    }
    setDownloaded(d => new Set([...d, ...selected]));
  };

  const downloadOne = (t) => {
    if (dlFmt === "pdf") {
      const win = window.open("", "_blank");
      if (!win) { alert("Popup blocked. Please allow popups."); return; }
      win.document.write(buildLetterHtml([t]));
      win.document.close();
      win.focus();
      setTimeout(() => win.print(), 500);
    } else {
      const csv  = buildLetterCsv([t]);
      const blob = new Blob([csv], { type: "application/vnd.ms-excel;charset=utf-8" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = `पत्र_${t.id.replace(/[^a-z0-9]/gi, "_")}.xls`;
      a.click();
      URL.revokeObjectURL(url);
    }
    setDownloaded(d => new Set([...d, t.id]));
  };

  return (
    <>
      <div style={{ background: "#E8F0FE", border: "1px solid #1a73e8", borderRadius: 7, padding: "8px 12px", marginBottom: 12, fontSize: 11, color: "#042C53" }}>
        ⬇️ <b>डाउनलोड टॅब:</b> Gmail मधील पत्रे <b>PDF</b> किंवा <b>MS Excel</b> फॉर्मॅटमध्ये डाउनलोड करा.
        <div style={{ fontSize: 10, color: "#666", marginTop: 3 }}>Desktop → <code style={{ background: "#d8e4f8", padding: "1px 4px", borderRadius: 3 }}>कार्यविवरण_{user.username}/</code> फोल्डरमध्ये जतन करा.</div>
      </div>

      {/* Format selector */}
      <div style={s.card}>
        <div style={s.cardHead}><span>💾</span><div style={s.cardTitle}>डाउनलोड फॉर्मॅट निवडा</div></div>
        <div style={{ padding: 14, display: "flex", gap: 10 }}>
          <div onClick={() => setDlFmt("pdf")} style={{ flex: 1, padding: "12px", borderRadius: 8, border: `2px solid ${dlFmt === "pdf" ? RD : "#d0d0c8"}`, background: dlFmt === "pdf" ? "#FFF5F5" : "#fff", cursor: "pointer", textAlign: "center" }}>
            <div style={{ fontSize: 26, marginBottom: 4 }}>📕</div>
            <div style={{ fontSize: 12, fontWeight: dlFmt === "pdf" ? 700 : 400, color: dlFmt === "pdf" ? RD : "#555" }}>PDF डाउनलोड</div>
            <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>Print → Save as PDF</div>
          </div>
          <div onClick={() => setDlFmt("excel")} style={{ flex: 1, padding: "12px", borderRadius: 8, border: `2px solid ${dlFmt === "excel" ? G : "#d0d0c8"}`, background: dlFmt === "excel" ? GL : "#fff", cursor: "pointer", textAlign: "center" }}>
            <div style={{ fontSize: 26, marginBottom: 4 }}>📗</div>
            <div style={{ fontSize: 12, fontWeight: dlFmt === "excel" ? 700 : 400, color: dlFmt === "excel" ? G : "#555" }}>Excel डाउनलोड</div>
            <div style={{ fontSize: 10, color: "#888", marginTop: 2 }}>.xls फाइल</div>
          </div>
        </div>
      </div>

      {/* Fetch + actions */}
      <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
        <button style={{ ...s.btnP, opacity: loading ? 0.7 : 1 }} onClick={onFetch} disabled={loading}>
          {loading ? "⏳ लोड होत आहे..." : "📧 Gmail मधून आणा"}
        </button>
        {threads.length > 0 && <>
          <button style={s.btnS} onClick={toggleAll}>{selectAll ? "✕ सर्व रद्द करा" : "☑ सर्व निवडा"}</button>
          {selected.size > 0 && (
            <button style={{ ...s.btnP, background: dlFmt === "pdf" ? RD : G }} onClick={downloadSelected}>
              {dlFmt === "pdf" ? "📕" : "📗"} निवडलेले {selected.size} डाउनलोड करा
            </button>
          )}
          {downloaded.size > 0 && <Badge type="g">{downloaded.size} डाउनलोड झाले</Badge>}
        </>}
      </div>

      {threads.length === 0 && !loading && (
        <div style={{ ...s.card, padding: 36, textAlign: "center", color: "#aaa", fontSize: 12 }}>
          <div style={{ fontSize: 32, marginBottom: 10 }}>📭</div>
          <b>"Gmail मधून आणा"</b> बटण दाबा
        </div>
      )}
      {loading && <div style={{ ...s.card, padding: 36, textAlign: "center", color: "#888", fontSize: 12 }}>⏳ Gmail लोड होत आहे...</div>}

      {!loading && threads.length > 0 && (
        <div style={s.card}>
          <div style={s.cardHead}>
            <input type="checkbox" checked={selectAll} onChange={toggleAll} style={{ cursor: "pointer" }} />
            <span>📂</span><div style={s.cardTitle}>Gmail पत्रे</div>
            <Badge type="b">{threads.length} ईमेल</Badge>
            {selected.size > 0 && <Badge type="a">{selected.size} निवडले</Badge>}
          </div>
          {threads.map((t, i) => (
            <div key={t.id} style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "9px 14px", borderBottom: i < threads.length - 1 ? "1px solid #f0f0e8" : "none", background: downloaded.has(t.id) ? "#FAFFF8" : selected.has(t.id) ? "#F0F7FF" : "#fff" }}>
              <input type="checkbox" checked={selected.has(t.id)} onChange={() => toggleThread(t.id)} style={{ marginTop: 3, cursor: "pointer" }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.subject}</div>
                <div style={{ fontSize: 10, color: "#888", marginTop: 1 }}>{t.from} · {t.date}</div>
                <div style={{ fontSize: 10, color: "#aaa", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.snippet}</div>
                {downloaded.has(t.id) && <div style={{ fontSize: 10, color: G, marginTop: 2, fontWeight: 600 }}>✓ डाउनलोड झाले</div>}
              </div>
              <button style={{ ...s.btnP, fontSize: 10, padding: "3px 10px", background: dlFmt === "pdf" ? RD : G, flexShrink: 0 }} onClick={() => downloadOne(t)}>
                {dlFmt === "pdf" ? "📕" : "📗"} डाउनलोड
              </button>
            </div>
          ))}
        </div>
      )}

      <div style={{ background: "#f8f8f4", borderRadius: 8, padding: "9px 12px", fontSize: 11, color: "#666", lineHeight: 1.8, marginTop: 4 }}>
        <b style={{ color: "#333" }}>📁 फाइल कुठे जतन करायची:</b><br />
        PDF: Print dialog → Destination → Save as PDF निवडा → Desktop वर जतन करा<br />
        Excel: डाउनलोड फोल्डरमधून → Desktop → <code style={{ background: "#e8e8e0", padding: "1px 4px", borderRadius: 3 }}>कार्यविवरण_{user.username}</code> मध्ये हलवा
      </div>
    </>
  );
}

function DeptsTab({ depts, clerks, users, letters, setModal, removeDept, toggleDeptClerk }) {
  const getClerkName = id => { const u = users.find(u => u.id === id); return u ? u.name.replace(/श्री[मती]* /, "") : "अज्ञात"; };
  const deptLetterCount = id => { const d = depts.find(x => x.id === id); return d ? letters.filter(l => l.section === d.name).length : 0; };
  const deptPendingCount = id => { const d = depts.find(x => x.id === id); return d ? letters.filter(l => l.section === d.name && l.status === "pending").length : 0; };

  return (
    <>
      {/* Summary bar */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 12 }}>
        <StatCard label="एकूण विभाग" value={depts.length} />
        <StatCard label="सक्रिय विभाग" value={depts.filter(d => d.active).length} color={G} />
        <StatCard label="निष्क्रिय विभाग" value={depts.filter(d => !d.active).length} color={AM} />
        <StatCard label="एकूण लिपिक" value={clerks.length} />
      </div>

      {/* Info banner */}
      <div style={{ background: "#E8F0FE", border: "1px solid #1a73e8", borderRadius: 7, padding: "8px 12px", marginBottom: 12, fontSize: 11, color: "#042C53", display: "flex", alignItems: "center", gap: 8 }}>
        🏢 <span>येथे कार्यालयाचे अंतर्गत विभाग व्यवस्थापित करा — विभाग जोडा, संपादित करा, लिपिक नियुक्त करा.</span>
      </div>

      {/* Main card */}
      <div style={s.card}>
        <div style={s.cardHead}>
          <span>🏢</span>
          <div style={s.cardTitle}>अंतर्गत विभाग यादी</div>
          <Badge type="b">{depts.length} विभाग</Badge>
          <button style={s.btnP} onClick={() => setModal({ type: "add_dept" })}>🏢+ नवीन विभाग जोडा</button>
        </div>

        {depts.length === 0
          ? <div style={{ padding: 28, textAlign: "center", color: "#aaa", fontSize: 12 }}>कोणतेही विभाग नाहीत. वरील बटण दाबून जोडा.</div>
          : depts.map(d => {
              const dClerks = clerks.filter(c => d.clerkIds.includes(c.id));
              const ltCount = deptLetterCount(d.id);
              const pendCount = deptPendingCount(d.id);
              return (
                <div key={d.id} style={{ borderBottom: "1px solid #f0f0e8", padding: "12px 14px" }}>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 12, flexWrap: "wrap" }}>
                    {/* Dept icon + name */}
                    <div style={{ width: 40, height: 40, borderRadius: 9, background: d.active ? GL : "#f0f0e8", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>🏢</div>
                    <div style={{ flex: 1, minWidth: 180 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 4 }}>
                        <span style={{ fontSize: 13, fontWeight: 700 }}>{d.name}</span>
                        <span style={{ fontSize: 10, fontFamily: "monospace", background: "#f4f4f0", padding: "1px 7px", borderRadius: 5, color: "#666", fontWeight: 600 }}>{d.code}</span>
                        <Badge type={d.active ? "g" : "a"}>{d.active ? "सक्रिय" : "निष्क्रिय"}</Badge>
                      </div>
                      {/* Details grid */}
                      <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: "3px 16px", fontSize: 11, color: "#555" }}>
                        {d.head && <div>👤 <b>प्रमुख:</b> {d.head}</div>}
                        {d.headMobile && <div>📱 {d.headMobile}</div>}
                        {d.email && <div>📧 {d.email}</div>}
                        {d.location && <div>📍 {d.location}</div>}
                      </div>
                      {/* Clerks assigned */}
                      <div style={{ marginTop: 7, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 10, color: "#888", fontWeight: 600 }}>नियुक्त लिपिक:</span>
                        {dClerks.length
                          ? dClerks.map(c => <span key={c.id} style={{ ...s.ctag, display: "inline-flex", alignItems: "center", gap: 4 }}>👤 {c.name.replace(/श्री[मती]* /, "")}</span>)
                          : <span style={{ fontSize: 10, color: "#bbb" }}>कोणी नाही</span>}
                      </div>
                      {/* Letter stats */}
                      <div style={{ marginTop: 6, display: "flex", gap: 8 }}>
                        <Badge type="b">{ltCount} पत्रे एकूण</Badge>
                        {pendCount > 0 && <Badge type="a">{pendCount} प्रलंबित</Badge>}
                        {pendCount === 0 && ltCount > 0 && <Badge type="g">सर्व पूर्ण</Badge>}
                      </div>
                      {/* Note */}
                      {d.note && <div style={{ marginTop: 5, fontSize: 10, color: "#888", fontStyle: "italic" }}>📝 {d.note}</div>}
                    </div>
                    {/* Action buttons */}
                    <div style={{ display: "flex", flexDirection: "column", gap: 5, flexShrink: 0 }}>
                      <button style={{ ...s.btnS, fontSize: 10, padding: "3px 10px" }} onClick={() => setModal({ type: "edit_dept", data: d })}>✏️ संपादन</button>
                      <button style={{ ...s.btnR, fontSize: 10, padding: "3px 10px" }} onClick={() => removeDept(d.id)}>✕ काढा</button>
                    </div>
                  </div>
                </div>
              );
            })}
      </div>

      {/* Clerk-Dept assignment matrix */}
      <div style={s.card}>
        <div style={s.cardHead}><span>🔗</span><div style={s.cardTitle}>लिपिक — विभाग नियुक्ती सारांश</div></div>
        <Tbl
          heads={["लिपिक", "विभाग", "एकूण पत्रे", "प्रलंबित", "स्थिती"]}
          rows={clerks.length
            ? clerks.map(c => {
                const assignedDepts = depts.filter(d => d.clerkIds.includes(c.id));
                const cl = letters.filter(l => l.clerkId === c.id);
                const ct = cl.length, cp = cl.filter(l => l.status === "pending").length;
                return (
                  <tr key={c.id}>
                    <td style={s.td}><div style={{ fontWeight: 600, fontSize: 11 }}>{c.name.replace(/श्री[मती]* /, "")}</div><div style={{ fontSize: 9, color: "#aaa" }}>{c.mobile}</div></td>
                    <td style={s.td}>
                      {assignedDepts.length
                        ? assignedDepts.map(d => <div key={d.id} style={{ ...s.ctag, display: "inline-block", marginBottom: 2, marginRight: 4 }}>{d.name}</div>)
                        : <span style={{ color: "#bbb", fontSize: 10 }}>नियुक्त नाही</span>}
                    </td>
                    <td style={{ ...s.td, textAlign: "center", fontWeight: 600 }}>{ct}</td>
                    <td style={{ ...s.td, textAlign: "center", color: cp > 0 ? AM : G, fontWeight: 600 }}>{cp}</td>
                    <td style={s.td}><Badge type={cp === 0 ? "g" : "a"}>{cp === 0 ? "पूर्ण" : "प्रलंबित"}</Badge></td>
                  </tr>
                );
              })
            : [<tr key="e"><td colSpan={5} style={{ ...s.td, textAlign: "center", color: "#aaa", padding: 20 }}>लिपिक नाहीत</td></tr>]}
        />
      </div>
    </>
  );
}
